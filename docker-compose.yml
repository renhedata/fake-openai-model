services:
  app:
    build:
      context: .
      target: runner
    environment:
      - PORT=3001
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://localhost:3001/health'); if (!r.ok) process.exit(1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
