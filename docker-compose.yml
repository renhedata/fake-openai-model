services:
  server:
    build:
      context: .
      target: server
    environment:
      - PORT=3000
    ports:
      - "23000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: web
    depends_on:
      - server
    environment:
      - VITE_BACKEND_URL=http://server:3000
    ports:
      - "5173:5173"
